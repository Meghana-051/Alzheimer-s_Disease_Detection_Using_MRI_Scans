<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alzheimer's Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Alzheimer's Disease Detection</h1>
        <p>Upload a brain MRI scan to get a condition assessment.</p>

        <form id="analysis-form">
            <div class="form-group">
                <label for="patient-name">Patient Name:</label>
                <input type="text" id="patient-name" name="name" placeholder="Enter name">
            </div>
            
            <div class="form-group">
                <label for="patient-age">Patient Age:</label>
                <input type="number" id="patient-age" name="age" placeholder="Enter age" min="0">
            </div>

            <div class="form-group">
                <label for="patient-gender">Patient Gender:</label>
                <select id="patient-gender" name="gender">
                    <option value="">Select...</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="image-upload">Upload MRI Scan:</label>
                <input type="file" id="image-upload" name="image" accept="image/*">
            </div>
            
            <button type="button" onclick="analyzeImage()">Analyze MRI</button>
        </form>

        <div id="results" class="results-container">
            <h2>Results:</h2>
            <div class="result-item">
                <strong>Predicted Condition:</strong> <span id="level">---</span>
            </div>
            <div class="result-item">
                <strong>Confidence Score:</strong> <span id="score">---</span>
            </div>
            <div class="result-item">
                <strong>Patient Info:</strong> <span id="patient-info">---</span>
            </div>
        </div>

        <button id="download-btn" class="download-btn" style="display:none;" onclick="downloadReport()">Download Report</button>
    </div>

    <script>
        let predictionData = {};

        function analyzeImage() {
            const fileInput = document.getElementById('image-upload');
            const file = fileInput.files[0];
            const downloadBtn = document.getElementById('download-btn');
            
            const patientName = document.getElementById('patient-name').value;
            const patientAge = document.getElementById('patient-age').value;
            const patientGender = document.getElementById('patient-gender').value;

            if (!file) {
                alert('Please select an image file first.');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('name', patientName);
            formData.append('age', patientAge);
            formData.append('gender', patientGender);
            
            downloadBtn.style.display = 'none';

            fetch('/analyze', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('level').textContent = data.predicted_level;
                    document.getElementById('score').textContent = data.prediction_score.toFixed(2);
                    
                    document.getElementById('patient-info').textContent = 
                        `${data.patient_name}, Age: ${data.patient_age}, Gender: ${data.patient_gender}`;

                    predictionData = {
                        predicted_level: data.predicted_level,
                        prediction_score: data.prediction_score,
                        patient_name: data.patient_name,
                        patient_age: data.patient_age,
                        patient_gender: data.patient_gender
                    };
                    downloadBtn.style.display = 'block';
                } else {
                    alert('Error during analysis: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An unexpected error occurred. Check the console for details.');
            });
        }

        function downloadReport() {
            if (!predictionData.predicted_level) {
                alert('Please analyze an image first.');
                return;
            }

            fetch('/generate_report', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(predictionData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'alzheimers_report.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while generating the PDF.');
            });
        }
    </script>
</body>
</html>
